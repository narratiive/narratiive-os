name: Tony Runtime Validation

on:
  pull_request:
    paths:
      - "runtime/**"
      - "tests/**"
      - "schemas/**"
      - ".github/workflows/runtime-tests.yml"
  push:
    branches: [main]
    paths:
      - "runtime/**"
      - "tests/**"
      - "schemas/**"
      - ".github/workflows/runtime-tests.yml"

permissions:
  contents: read

jobs:
  validate-runtime:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compile runtime and tests
        run: python -m compileall -q runtime tests

      - name: Run runtime test suite
        run: python -m unittest discover -s tests -p "test_*.py" -v
